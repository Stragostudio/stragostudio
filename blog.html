<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Strago Studio</title>
  <meta name="description" content="Ideas y aprendizajes sobre adquisición, performance y crecimiento digital — por Strago Studio." />
  <meta property="og:title" content="Blog | Strago Studio" />
  <meta property="og:description" content="Ideas y aprendizajes sobre adquisición, performance y crecimiento digital." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#050506" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/favicon.png" />

  <style>
    :root { --black:#050506; --copper:#C25E45; --copper-2:#D97A5E; --cream:#F5F1EB; --line:rgba(255,255,255,.10); --muted:rgba(245,241,235,.55); --pad:clamp(20px,5vw,48px); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--cream); overflow-x: clip; -webkit-font-smoothing: antialiased; line-height: 1.5; min-height: 100vh; }
    h1, h2, h3 { font-family: 'Satoshi', 'Inter', sans-serif; }
    a { color: inherit; }
    ::selection { background: var(--copper); color: #fff; }
    .wrap { max-width: 1160px; margin: 0 auto; padding: 0 var(--pad); }

    /* NAV */
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px var(--pad); }
    .navbar.scrolled { background: rgba(5,5,6,.72); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); border-bottom: 1px solid var(--line); }
    .logo { text-decoration: none; display: inline-flex; align-items: center; }
    .logo .logo-img { height: 34px; width: auto; display: block; }
    .logo .b { font-weight: 700; } .logo .l { font-weight: 300; }
    .logo::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--copper); margin-bottom: 2px; }
    .nav-links { display: flex; align-items: center; gap: 2px; background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)); border: 1px solid rgba(255,255,255,.16); border-radius: 100px; padding: 9px 22px; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); box-shadow: 0 0 46px rgba(255,255,255,.10); }
    .nav-links a { color: rgba(245,241,235,.55); text-decoration: none; font-size: 13.5px; font-weight: 500; padding: 6px 15px; border-radius: 100px; transition: color .2s; white-space: nowrap; }
    .nav-links a:hover, .nav-links a.active { color: var(--cream); }
    .nav-cta { display: inline-flex; align-items: center; background: rgba(13,14,11,.45); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); color: var(--cream); font-size: 13.5px; font-weight: 700; padding: 9px 22px; border-radius: 100px; text-decoration: none; position: relative; box-shadow: 0 0 16px rgba(74,158,232,.24), 0 0 28px rgba(194,94,69,.18); }
    .nav-cta::before { content: ''; position: absolute; inset: 0; border-radius: 100px; padding: 1.5px; background: linear-gradient(135deg, #4A9EE8, rgba(245,241,235,.6) 38%, var(--copper) 72%, var(--copper-2)); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
    .nav-toggle { display: none; flex-direction: column; gap: 5px; width: 42px; height: 42px; align-items: center; justify-content: center; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14); border-radius: 12px; cursor: pointer; }
    .nav-toggle span { width: 18px; height: 2px; background: #fff; border-radius: 2px; transition: transform .3s, opacity .3s; }
    .nav-toggle.open span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2){ opacity: 0; }
    .nav-toggle.open span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }
    .mmenu { position: fixed; top: 0; left: 0; right: 0; z-index: 99; display: flex; flex-direction: column; gap: 2px; padding: 92px 24px 28px; background: rgba(5,5,6,.94); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); transform: translateY(-110%); opacity: 0; pointer-events: none; transition: transform .42s cubic-bezier(.22,.61,.36,1), opacity .3s; }
    .mmenu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .mmenu a { color: rgba(255,255,255,.82); text-decoration: none; font-size: 18px; font-weight: 600; padding: 15px 6px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .mmenu .mcta { margin-top: 16px; text-align: center; background: var(--copper); color: #fff; border-radius: 14px; padding: 15px; border-bottom: none; }

    /* HEADER */
    .head { position: relative; padding: 168px var(--pad) 60px; overflow: hidden; }
    .head__glow { position: absolute; top: -10%; left: 8%; width: 50vw; max-width: 620px; height: 50vw; max-height: 620px; border-radius: 50%; background: radial-gradient(circle, rgba(194,94,69,.22), transparent 62%); filter: blur(30px); pointer-events: none; }
    .head .wrap { position: relative; }
    .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--copper); margin-bottom: 18px; }
    .head h1 { font-size: clamp(40px, 7vw, 84px); font-weight: 700; letter-spacing: -.04em; line-height: 1.02; color: #fff; }
    .head p { font-size: clamp(15px,1.6vw,18px); color: var(--muted); max-width: 520px; margin-top: 20px; line-height: 1.6; }

    /* BLOG GRID */
    .blog { padding: 40px var(--pad) 120px; }
    .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .blog-card { display: flex; flex-direction: column; text-decoration: none; overflow: hidden; border-radius: 18px; border: 1px solid var(--line); background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)); transition: transform .3s, border-color .3s, box-shadow .3s; opacity: 0; transform: translateY(28px); }
    .blog-card.in { opacity: 1; transform: none; transition: opacity .6s ease, transform .6s ease; }
    .blog-card:hover { transform: translateY(-6px); border-color: rgba(194,94,69,.35); box-shadow: 0 24px 50px rgba(0,0,0,.45); }
    .blog-card__media { position: relative; aspect-ratio: 16/10; background-size: cover; background-position: center; }
    .blog-card__media--ph { background: radial-gradient(120% 120% at 20% 0%, rgba(194,94,69,.35), transparent 55%), linear-gradient(180deg,#15161a,#0d0e12); }
    .blog-card__cat { position: absolute; top: 14px; left: 14px; font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #fff; background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.15); padding: 5px 10px; border-radius: 999px; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    .blog-card__body { padding: 22px; display: flex; flex-direction: column; gap: 8px; }
    .blog-card__meta { font-size: 12px; color: rgba(255,255,255,.45); }
    .blog-card__title { font-size: 18px; font-weight: 600; letter-spacing: -.02em; color: #fff; line-height: 1.25; overflow-wrap: anywhere; }
    .blog-card__excerpt { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .blog-empty { color: rgba(255,255,255,.4); font-size: 15px; }

    /* FOOTER */
    .foot { border-top: 1px solid var(--line); padding: 48px var(--pad); }
    .foot .wrap { display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
    .foot a.flogo { text-decoration: none; display: inline-flex; align-items: center; }
    .foot a.flogo .logo-img { height: 38px; width: auto; display: block; }
    .foot__links { display: flex; gap: 20px; flex-wrap: wrap; }
    .foot__links a { font-size: 13.5px; color: var(--muted); text-decoration: none; transition: color .2s; }
    .foot__links a:hover { color: var(--cream); }

    @media (max-width: 900px) { .nav-links { display: none; } .nav-toggle { display: flex; } .nav-cta { display: none; } }
    @media (max-width: 880px) { .blog-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .blog-grid { grid-template-columns: 1fr; } .head { padding-top: 140px; } }
  </style>
</head>
<body>

<nav class="navbar" id="nav">
  <a href="index.html#inicio" class="logo" aria-label="Strago Studio — inicio"><img src="assets/logo.png" alt="Strago Studio" class="logo-img" /></a>
  <div class="nav-links">
    <a href="index.html#servicios">Servicios</a>
    <a href="index.html#industrias">Industrias</a>
    <a href="blog.html" class="active">Blog</a>
    <a href="index.html#contacto">Contacto</a>
  </div>
  <a href="index.html#contacto" class="nav-cta">Hablemos</a>
  <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false"><span></span><span></span><span></span></button>
</nav>

<div class="mmenu" id="mmenu" aria-hidden="true">
  <a href="index.html#servicios">Servicios</a>
  <a href="index.html#industrias">Industrias</a>
  <a href="blog.html">Blog</a>
  <a href="index.html#contacto">Contacto</a>
  <a href="index.html#contacto" class="mcta">Hablemos</a>
</div>

<header class="head">
  <div class="head__glow" aria-hidden="true"></div>
  <div class="wrap">
    <div class="eyebrow">Blog</div>
    <h1>Ideas que mueven el resultado.</h1>
    <p>Aprendizajes sobre adquisición, performance y crecimiento digital. Lo que vamos descubriendo operando embudos reales.</p>
  </div>
</header>

<main class="blog">
  <div class="wrap">
    <div class="blog-grid" id="blogGrid" aria-live="polite"></div>
  </div>
</main>

<footer class="foot">
  <div class="wrap">
    <a href="index.html#inicio" class="flogo" aria-label="Strago Studio — inicio"><img src="assets/logo.png" alt="Strago Studio" class="logo-img" /></a>
    <nav class="foot__links" aria-label="Links">
      <a href="index.html#servicios">Servicios</a>
      <a href="index.html#industrias">Industrias</a>
      <a href="igaming-marketing.html">iGaming</a>
      <a href="index.html#contacto">Contacto</a>
      <a href="https://www.linkedin.com/company/strago-studio" target="_blank" rel="noopener">LinkedIn</a>
    </nav>
  </div>
</footer>

<script>
  /* NAV scrolled + menú móvil */
  (function () {
    var nav = document.getElementById('nav');
    window.addEventListener('scroll', function () { nav.classList.toggle('scrolled', window.scrollY > 40); }, { passive: true });
    var t = document.getElementById('navToggle'), m = document.getElementById('mmenu');
    function setOpen(o) { t.classList.toggle('open', o); m.classList.toggle('open', o); t.setAttribute('aria-expanded', o); m.setAttribute('aria-hidden', !o); document.body.style.overflow = o ? 'hidden' : ''; }
    t.addEventListener('click', function () { setOpen(!m.classList.contains('open')); });
    m.querySelectorAll('a').forEach(function (a) { a.addEventListener('click', function () { setOpen(false); }); });
  })();

  /* Render de Insights desde assets/insights.json */
  (function () {
    var grid = document.getElementById('blogGrid');
    if (!grid) return;
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
    function fmtDate(iso) { try { return new Date(iso + 'T00:00:00').toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' }); } catch (e) { return iso || ''; } }
    function render(posts) {
      if (!posts || !posts.length) { grid.innerHTML = '<p class="blog-empty">Pronto publicaremos nuestros primeros artículos.</p>'; return; }
      grid.innerHTML = posts.map(function (p) {
        var hasImg = p.image && p.image.trim();
        var media = '<div class="blog-card__media' + (hasImg ? '' : ' blog-card__media--ph') + '"' + (hasImg ? ' style="background-image:url(\'' + esc(p.image) + '\')"' : '') + '>' + (p.category ? '<span class="blog-card__cat">' + esc(p.category) + '</span>' : '') + '</div>';
        var meta = fmtDate(p.date) + (p.readingTime ? ' · ' + esc(p.readingTime) : '');
        return '<a class="blog-card" href="' + esc(p.url || '#') + '">' + media + '<div class="blog-card__body"><div class="blog-card__meta">' + meta + '</div><h3 class="blog-card__title">' + esc(p.title) + '</h3><p class="blog-card__excerpt">' + esc(p.excerpt) + '</p></div></a>';
      }).join('');
      // reveal escalonado
      var cards = grid.querySelectorAll('.blog-card');
      if ('IntersectionObserver' in window) {
        var io = new IntersectionObserver(function (es) { es.forEach(function (e, i) { if (e.isIntersecting) { e.target.style.transitionDelay = (i % 3 * 80) + 'ms'; e.target.classList.add('in'); io.unobserve(e.target); } }); }, { threshold: .15 });
        cards.forEach(function (c) { io.observe(c); });
      } else { cards.forEach(function (c) { c.classList.add('in'); }); }
    }
    fetch('assets/insights.json', { cache: 'no-cache' })
      .then(function (r) { if (!r.ok) throw new Error('http'); return r.json(); })
      .then(function (d) { render(d.posts || []); })
      .catch(function () { grid.innerHTML = '<p class="blog-empty">Pronto publicaremos nuestros primeros artículos.</p>'; });
  })();
</script>

</body>
</html>
